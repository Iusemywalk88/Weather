version: '3.8'

services:
  db:
    image: postgres:16
    container_name: weather_db_container
    restart: always
    environment:
      POSTGRES_DB: weather_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d weather_service_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
